<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag crucial para Mobile-First: garante proporção correta e evita zoom indesejado -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ryde | Autonomia S17</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <h1>Ryde</h1>
        <p>Controle Pessoal de Autonomia</p>
    </header>

    <main class="app-content">
        <!-- BATERIA ATUAL -->
        <section class="battery-section">
            <div class="battery-card">
                <h2>Bateria Atual</h2>
                <div class="input-group">
                    <input type="number" id="current-battery" placeholder="100" min="0" max="100" pattern="[0-9]*">
                    <span class="percent-symbol">%</span>
                </div>
            </div>
        </section>

        <!-- TRAJETOS -->
         <section class="routes-section">
            <div class="section-header">
                <h2>Meus Trajetos</h2>
                <button id="add-route-btn" class="icon-btn" aria-label="Adicionar novo trajeto"> + </button>
            </div>
         

            <!-- ONDE OS TRAJETOS VAO APARECER -->
            <ul id="routes-list" class="routes-list">
                
            </ul>
          </section>


    </main>

    <!-- TELA DE ADD TRAJETO -->
     <div id="add-route-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>Novo Trajeto</h3>
            <div class="form-group">
                <label for="route-name-input">Nome do Trajeto</label>
                <input type="text" id="route-name-input" placeholder="Ex: Trabalho -> Casa">
            </div>

            <div class="form-group">
                <label for="route-consumption-input">Consumo de Bateria</label>
                <input type="number" id="route-consumption-input" placeholder="15" min="'" max="100" pattern="[0-9]*">
            </div>

            <div class="modal-actions">
                <button id="cancel-route-btn" class="btn-secondary">Cancelar</button>
                <button id="save-route-btn" class="btn-primary">Salvar</button>
            </div>

        </div>
     </div> 


     <!-- TELA DE BATERIA INSUFICIENTE -->
     <div id="battery-alert" class="modal-overlay hidden">
        <div class="modal-card alert-card">
            <!-- Imagem da bateria fraca centralizada -->
            <img src="img/lowbattery.png" alt="Ícone de Bateria Fraca" class="alert-icon">

            <h3 class="alert-title">Carga Insuficiente!</h3>
            <p class="alert-message">A bateria atual não é suficiente para concluir o trajeto selecionado.</p>


            <div class="modal-actions">
                <button id="close-alert-btn" class="btn-primary btn-alert">Cancelar</button>
            </div>
            
        </div>
     </div> 


     <!-- TELA DE POUCA BATERIA -->
     <div id="battery-advice" class="modal-overlay hidden">
        <div class="modal-card advice-card">
            <!-- Imagem da bateria fraca centralizada -->
            <img src="img/batteryending.png" alt="Ícone de Pouca Bateria" class="advice-icon">

            <h3 class="advice-title">Atenção!</h3>
            <p class="alert-message">Bateria próxima de zero poderá perder força e correr risco de desligamento automático.</p>


            <div class="modal-actions">
                <button id="close-advice-btn" class="btn-primary btn-advice">Entendi</button>
            </div>
            
        </div>
     </div> 



    <!-- TELA DE OPÇÕES DO TRAJETO (Menu de Contexto) -->
    <div id="route-options-modal" class="context-overlay hidden">
        <div class="context-menu" id="context-menu">
            <!-- Fonte normal, cor neutra ou verde -->
            <button id="edit-route-btn" class="context-btn">Editar Trajeto</button>
            <!-- Fonte vermelha de alerta -->
            <button id="delete-route-btn" class="context-btn context-delete">Excluir Trajeto</button>
        </div>
    </div>


    <!-- TELA DE CONFIRMAÇÃO DE EXCLUSÃO -->
    <div id="delete-confirm-modal" class="modal-overlay hidden">
        <div class="modal-card confirm-card">
            <h3 class="confirm-title">Excluir Trajeto?</h3>
            
            <div class="modal-actions">
                <button id="cancel-delete-btn" class="btn-secondary">Cancelar</button>
                <button id="confirm-delete-btn" class="btn-primary btn-danger">Excluir</button>
            </div>
        </div>
    </div>


    <script src="app.js"></script>

</body>






</html>
